<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CaddyShot // Premium Golf Tracker</title>
    
    <!-- Tailwind CSS v3 CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        slate: {
                            850: '#1e293b',
                            950: '#020617',
                        },
                        emerald: {
                            500: '#10b981',
                            600: '#059669',
                            400: '#34d399',
                        }
                    },
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Custom CSS for custom scrollbars and animations -->
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        /* Custom hide scrollbar */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        @keyframes pulse-emerald {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: .5; transform: scale(1.1); }
        }
        .pulse-dot {
            animation: pulse-emerald 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
</head>
<body class="h-full bg-slate-950 text-slate-100 flex justify-center items-stretch overflow-hidden select-none">

    <!-- Container matching mobile aspect ratio and viewport -->
    <div class="w-full max-w-md bg-slate-900 border-x border-slate-800 flex flex-col h-full relative overflow-hidden shadow-2xl">
        
        <!-- Header -->
        <header class="bg-slate-950/80 backdrop-blur-md border-b border-slate-800/80 px-4 py-3 flex items-center justify-between sticky top-0 z-20">
            <!-- Hole Selector -->
            <div class="flex items-center gap-2">
                <button onclick="changeHole(-1)" class="w-8 h-8 rounded-lg bg-slate-800 hover:bg-slate-700 active:scale-90 flex items-center justify-center text-slate-400 transition-all">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"/></svg>
                </button>
                <div class="bg-slate-900/90 border border-slate-800 px-3 py-1 rounded-lg flex flex-col items-center min-w-[70px]">
                    <span class="text-[9px] uppercase tracking-wider text-slate-500 font-bold">Hole</span>
                    <span id="currentHoleDisplay" class="text-base font-extrabold text-emerald-400">1</span>
                </div>
                <button onclick="changeHole(1)" class="w-8 h-8 rounded-lg bg-slate-800 hover:bg-slate-700 active:scale-90 flex items-center justify-center text-slate-400 transition-all">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"/></svg>
                </button>
            </div>

            <!-- Logo -->
            <div class="flex flex-col items-center">
                <span class="text-xs font-black tracking-widest text-slate-400">CADDY<span class="text-emerald-500">SHOT</span></span>
                <span id="holeNameDisplay" class="text-[9px] text-slate-500 font-semibold uppercase tracking-wider">Hole 1 (Par 4)</span>
            </div>

            <!-- Shot Display -->
            <div class="flex items-center gap-2">
                <div class="bg-slate-900/90 border border-slate-800 px-3 py-1 rounded-lg flex flex-col items-center min-w-[70px]">
                    <span class="text-[9px] uppercase tracking-wider text-slate-500 font-bold">Shot</span>
                    <span id="currentShotDisplay" class="text-base font-extrabold text-emerald-400">1</span>
                </div>
                <div class="flex flex-col gap-1">
                    <button onclick="adjustShot(1)" class="w-6 h-6 rounded bg-slate-800 hover:bg-slate-700 active:scale-90 flex items-center justify-center text-slate-400 text-xs transition-all">+</button>
                    <button onclick="adjustShot(-1)" class="w-6 h-6 rounded bg-slate-800 hover:bg-slate-700 active:scale-90 flex items-center justify-center text-slate-400 text-xs transition-all">-</button>
                </div>
            </div>
        </header>

        <!-- Main Body Scroll Area -->
        <main class="flex-1 overflow-y-auto px-4 py-4 space-y-4 no-scrollbar pb-24">
            
            <!-- Pin Location Toggle -->
            <div class="bg-slate-950/60 p-1.5 rounded-xl border border-slate-800/60 flex items-center justify-between gap-1 shadow-inner">
                <button onclick="setPinPosition('front')" id="pin-front" class="flex-1 py-2 rounded-lg font-bold text-xs uppercase tracking-wider transition-all duration-200 text-slate-400 hover:text-slate-200">
                    Front
                </button>
                <button onclick="setPinPosition('center')" id="pin-center" class="flex-1 py-2 rounded-lg font-bold text-xs uppercase tracking-wider transition-all duration-200 text-slate-400 hover:text-slate-200">
                    Center
                </button>
                <button onclick="setPinPosition('back')" id="pin-back" class="flex-1 py-2 rounded-lg font-bold text-xs uppercase tracking-wider transition-all duration-200 text-slate-400 hover:text-slate-200">
                    Back
                </button>
            </div>

            <!-- GPS Yardage and Override Display Card -->
            <div class="relative bg-gradient-to-b from-slate-900 to-slate-950 border border-slate-800 rounded-2xl p-5 text-center shadow-lg overflow-hidden">
                <!-- Status Dots -->
                <div class="absolute top-3 left-4 flex items-center gap-1.5 bg-slate-900/80 px-2 py-0.5 rounded-full border border-slate-800/80">
                    <span id="gpsStatusDot" class="w-2.5 h-2.5 rounded-full bg-yellow-500 pulse-dot"></span>
                    <span id="gpsStatusText" class="text-[9px] uppercase font-bold text-slate-400">Acquiring GPS</span>
                </div>

                <!-- Simulation Alert -->
                <div id="simulatedIndicator" class="hidden absolute top-3 right-4 bg-amber-500/10 border border-amber-500/20 px-2 py-0.5 rounded-full">
                    <span class="text-[9px] uppercase font-bold text-amber-400">Simulated</span>
                </div>

                <!-- Yardage Display -->
                <div class="mt-4 py-3">
                    <div class="flex justify-center items-baseline">
                        <span id="distanceDisplay" class="text-7xl font-extrabold tracking-tighter text-slate-100 transition-all duration-150">---</span>
                        <span class="text-2xl font-bold text-emerald-400 ml-1">YDS</span>
                    </div>
                    <!-- Override Warning / GPS Status Info -->
                    <div class="mt-1 flex items-center justify-center gap-2">
                        <span id="distanceLabel" class="text-xs text-slate-500 uppercase tracking-widest font-semibold">GPS Distance</span>
                        <button onclick="clearManualOverride()" id="clearOverrideBtn" class="hidden text-[10px] bg-rose-500/10 border border-rose-500/20 text-rose-400 px-2 py-0.5 rounded hover:bg-rose-500/20 active:scale-95 transition-all">
                            Use GPS
                        </button>
                    </div>
                </div>

                <!-- Refresh GPS button -->
                <div class="border-t border-slate-800/60 pt-3 flex justify-between items-center text-xs">
                    <span class="text-slate-500 font-medium" id="targetCoordsText">Target: Loading...</span>
                    <button onclick="refreshGPS()" class="flex items-center gap-1 text-emerald-400 hover:text-emerald-300 font-bold active:scale-95 transition-all">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.228 10H18.228"/></svg>
                        Refresh GPS
                    </button>
                </div>
            </div>

            <!-- Manual Override Keypad -->
            <div class="bg-slate-900 border border-slate-800/80 rounded-2xl p-3 shadow-md">
                <div class="text-[10px] text-slate-500 uppercase tracking-widest font-bold text-center mb-2">Manual Distance Keypad</div>
                <div class="grid grid-cols-3 gap-1.5 max-w-[280px] mx-auto">
                    <!-- Keypad Keys -->
                    <button onclick="pressKey('1')" class="py-2.5 bg-slate-950 hover:bg-slate-850 active:scale-90 rounded-xl font-bold text-lg text-slate-200 border border-slate-800/60 transition-all">1</button>
                    <button onclick="pressKey('2')" class="py-2.5 bg-slate-950 hover:bg-slate-850 active:scale-90 rounded-xl font-bold text-lg text-slate-200 border border-slate-800/60 transition-all">2</button>
                    <button onclick="pressKey('3')" class="py-2.5 bg-slate-950 hover:bg-slate-850 active:scale-90 rounded-xl font-bold text-lg text-slate-200 border border-slate-800/60 transition-all">3</button>
                    <button onclick="pressKey('4')" class="py-2.5 bg-slate-950 hover:bg-slate-850 active:scale-90 rounded-xl font-bold text-lg text-slate-200 border border-slate-800/60 transition-all">4</button>
                    <button onclick="pressKey('5')" class="py-2.5 bg-slate-950 hover:bg-slate-850 active:scale-90 rounded-xl font-bold text-lg text-slate-200 border border-slate-800/60 transition-all">5</button>
                    <button onclick="pressKey('6')" class="py-2.5 bg-slate-950 hover:bg-slate-850 active:scale-90 rounded-xl font-bold text-lg text-slate-200 border border-slate-800/60 transition-all">6</button>
                    <button onclick="pressKey('7')" class="py-2.5 bg-slate-950 hover:bg-slate-850 active:scale-90 rounded-xl font-bold text-lg text-slate-200 border border-slate-800/60 transition-all">7</button>
                    <button onclick="pressKey('8')" class="py-2.5 bg-slate-950 hover:bg-slate-850 active:scale-90 rounded-xl font-bold text-lg text-slate-200 border border-slate-800/60 transition-all">8</button>
                    <button onclick="pressKey('9')" class="py-2.5 bg-slate-950 hover:bg-slate-850 active:scale-90 rounded-xl font-bold text-lg text-slate-200 border border-slate-800/60 transition-all">9</button>
                    <button onclick="pressKey('C')" class="py-2.5 bg-rose-950/40 hover:bg-rose-950/60 border border-rose-900/30 active:scale-90 rounded-xl font-bold text-base text-rose-400 transition-all">C</button>
                    <button onclick="pressKey('0')" class="py-2.5 bg-slate-950 hover:bg-slate-850 active:scale-90 rounded-xl font-bold text-lg text-slate-200 border border-slate-800/60 transition-all">0</button>
                    <button onclick="pressKey('⌫')" class="py-2.5 bg-slate-950 hover:bg-slate-850 active:scale-90 rounded-xl font-bold text-base text-slate-400 border border-slate-800/60 transition-all">⌫</button>
                </div>
            </div>

            <!-- Lie Selection Grid -->
            <div class="space-y-2">
                <div class="text-[10px] text-slate-500 uppercase tracking-widest font-bold text-center">Select Current Lie</div>
                <div class="grid grid-cols-3 gap-2">
                    
                    <!-- Tee Button -->
                    <button onclick="selectLie('Tee')" id="lie-Tee" class="flex flex-col items-center justify-center p-3 rounded-xl border transition-all duration-200 bg-slate-900 border-slate-800 text-slate-300 hover:border-slate-700 active:scale-95">
                        <svg class="w-6 h-6 mb-1.5 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="2" x2="12" y2="18" />
                            <ellipse cx="12" cy="2" rx="4" ry="1" />
                            <path d="M7 18h10M10 22h4" />
                        </svg>
                        <span class="text-xs font-bold uppercase tracking-wide">Tee</span>
                    </button>

                    <!-- Fairway Button -->
                    <button onclick="selectLie('Fairway')" id="lie-Fairway" class="flex flex-col items-center justify-center p-3 rounded-xl border transition-all duration-200 bg-slate-900 border-slate-800 text-slate-300 hover:border-slate-700 active:scale-95">
                        <svg class="w-6 h-6 mb-1.5 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 20c3-3 6-3 9 0s6 3 9 0" />
                            <path d="M3 16c3-2 6-2 9 0s6 2 9 0" />
                            <circle cx="12" cy="8" r="3" />
                        </svg>
                        <span class="text-xs font-bold uppercase tracking-wide">Fairway</span>
                    </button>

                    <!-- Rough Button -->
                    <button onclick="selectLie('Rough')" id="lie-Rough" class="flex flex-col items-center justify-center p-3 rounded-xl border transition-all duration-200 bg-slate-900 border-slate-800 text-slate-300 hover:border-slate-700 active:scale-95">
                        <svg class="w-6 h-6 mb-1.5 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 22v-6M6 22v-9M9 22v-11M12 22v-7M15 22v-10M18 22v-8M21 22v-5" stroke-linecap="round"/>
                            <circle cx="12" cy="6" r="2" />
                        </svg>
                        <span class="text-xs font-bold uppercase tracking-wide">Rough</span>
                    </button>

                    <!-- Sand Button -->
                    <button onclick="selectLie('Sand')" id="lie-Sand" class="flex flex-col items-center justify-center p-3 rounded-xl border transition-all duration-200 bg-slate-900 border-slate-800 text-slate-300 hover:border-slate-700 active:scale-95">
                        <svg class="w-6 h-6 mb-1.5 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 18c2.5-1 5-2 8-1s5.5 2 10 0" />
                            <circle cx="6" cy="11" r="0.5" fill="currentColor" />
                            <circle cx="10" cy="13" r="0.5" fill="currentColor" />
                            <circle cx="14" cy="10" r="0.5" fill="currentColor" />
                            <circle cx="18" cy="12" r="0.5" fill="currentColor" />
                            <circle cx="12" cy="6" r="2.5" />
                        </svg>
                        <span class="text-xs font-bold uppercase tracking-wide">Sand</span>
                    </button>

                    <!-- Green Button -->
                    <button onclick="selectLie('Green')" id="lie-Green" class="flex flex-col items-center justify-center p-3 rounded-xl border transition-all duration-200 bg-slate-900 border-slate-800 text-slate-300 hover:border-slate-700 active:scale-95">
                        <svg class="w-6 h-6 mb-1.5 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 2v20" />
                            <path d="M12 4l7 4-7 4" />
                            <ellipse cx="12" cy="21" rx="4" ry="1.5" />
                        </svg>
                        <span class="text-xs font-bold uppercase tracking-wide">Green</span>
                    </button>

                    <!-- Penalty Button -->
                    <button onclick="selectLie('Penalty')" id="lie-Penalty" class="flex flex-col items-center justify-center p-3 rounded-xl border transition-all duration-200 bg-slate-900 border-slate-800 text-slate-300 hover:border-slate-700 active:scale-95">
                        <svg class="w-6 h-6 mb-1.5 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 9v4M12 17h.01M12 3a9 9 0 110 18 9 9 0 010-18z" stroke-linecap="round"/>
                        </svg>
                        <span class="text-xs font-bold uppercase tracking-wide text-rose-400">Penalty</span>
                    </button>

                </div>
            </div>

            <!-- Dev Simulator Collapsible Console -->
            <div class="bg-slate-950/40 border border-slate-800/80 rounded-xl overflow-hidden transition-all duration-300 shadow">
                <button onclick="toggleDevConsole()" class="w-full px-4 py-2 flex items-center justify-between text-slate-400 hover:text-slate-300 font-bold text-xs uppercase tracking-wider">
                    <span class="flex items-center gap-1.5">
                        <span>🛠️</span> Developer Simulator Console
                    </span>
                    <svg id="devArrow" class="w-3.5 h-3.5 transform transition-transform duration-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                </button>
                <div id="devConsoleContent" class="hidden border-t border-slate-800/40 p-3 bg-slate-950/60 grid grid-cols-2 gap-2 text-xs">
                    <button onclick="setSimulation(null)" class="py-1.5 bg-slate-800 rounded font-semibold text-slate-300 hover:bg-slate-700 transition-all">
                        Real Device GPS
                    </button>
                    <button onclick="setSimulation(250)" class="py-1.5 bg-amber-500/10 border border-amber-500/25 text-amber-300 rounded font-semibold hover:bg-amber-500/20 transition-all">
                        Mock 250 Yds Out
                    </button>
                    <button onclick="setSimulation(150)" class="py-1.5 bg-amber-500/10 border border-amber-500/25 text-amber-300 rounded font-semibold hover:bg-amber-500/20 transition-all">
                        Mock 150 Yds Out
                    </button>
                    <button onclick="setSimulation(75)" class="py-1.5 bg-amber-500/10 border border-amber-500/25 text-amber-300 rounded font-semibold hover:bg-amber-500/20 transition-all">
                        Mock 75 Yds Out
                    </button>
                    <button onclick="setSimulation(15)" class="py-1.5 bg-amber-500/10 border border-amber-500/25 text-amber-300 rounded font-semibold hover:bg-amber-500/20 transition-all">
                        Mock 15 Yds (Green)
                    </button>
                    <button onclick="setSimulation(3)" class="py-1.5 bg-amber-500/10 border border-amber-500/25 text-amber-300 rounded font-semibold hover:bg-amber-500/20 transition-all">
                        Mock 3 Yds (Putt)
                    </button>
                    <div class="col-span-2 text-[10px] text-slate-500 text-center italic mt-1">
                        Mock modes calculate distance relative to the chosen hole's green target coordinates.
                    </div>
                </div>
            </div>

            <!-- Visual Shot History / Collapsible -->
            <div class="bg-slate-900 border border-slate-800/80 rounded-2xl overflow-hidden transition-all duration-300">
                <button onclick="toggleLog()" class="w-full px-4 py-3 bg-slate-950/60 flex items-center justify-between text-slate-300 hover:text-slate-100 font-bold text-xs uppercase tracking-wider">
                    <span>📋 Current Round Shot Log (<span id="logCount">0</span>)</span>
                    <svg id="logArrow" class="w-4 h-4 transform transition-transform duration-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                </button>
                <div id="shotLogContainer" class="hidden border-t border-slate-800 max-h-[160px] overflow-y-auto divide-y divide-slate-850 no-scrollbar">
                    <!-- Log entries populated here -->
                    <div id="emptyLogText" class="p-4 text-center text-xs text-slate-500 italic">No shots logged yet. Take your first shot!</div>
                </div>
            </div>

        </main>

        <!-- Bottom Action Bar (Fixed at bottom of mobile viewport) -->
        <footer class="absolute bottom-0 left-0 right-0 bg-slate-950/90 backdrop-blur-md border-t border-slate-800/80 p-4 z-10 space-y-2">
            
            <!-- Main ENTER SHOT Button -->
            <button onclick="submitShot()" id="enterShotBtn" class="w-full bg-emerald-500 hover:bg-emerald-400 active:scale-[0.98] text-slate-950 font-bold py-3.5 rounded-xl text-center text-sm uppercase tracking-widest shadow-lg shadow-emerald-500/10 transition-all">
                Enter Shot
            </button>

            <!-- Secondary Actions Row -->
            <div class="flex gap-2">
                <button onclick="copyCSVExport()" class="flex-1 bg-slate-900 hover:bg-slate-800 active:scale-95 text-slate-300 border border-slate-800 font-bold py-2 rounded-lg text-[10px] uppercase tracking-wider transition-all flex items-center justify-center gap-1">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"/></svg>
                    Export CSV
                </button>
                <button onclick="confirmReset()" class="flex-1 bg-slate-900 hover:bg-slate-800 active:scale-95 text-rose-400 border border-slate-800 font-bold py-2 rounded-lg text-[10px] uppercase tracking-wider transition-all flex items-center justify-center gap-1">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-16v1a3 3 0 003 3h10M9 3h6m2 5V4a1 1 0 00-1-1H7a1 1 0 00-1 1v4"/></svg>
                    Reset Round
                </button>
            </div>
        </footer>

        <!-- Alert overlay for clipboard copy and alerts -->
        <div id="toastAlert" class="pointer-events-none opacity-0 transform translate-y-3 transition-all duration-300 absolute bottom-24 left-1/2 -translate-x-1/2 z-50 bg-emerald-600/90 text-white font-semibold text-xs py-2 px-4 rounded-full shadow-lg border border-emerald-400 flex items-center gap-1.5">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg>
            <span id="toastMessage">Copied to Clipboard!</span>
        </div>

    </div>

    <!-- JavaScript Application Logic -->
    <script>
        // HOLE DATABASE (Pebble Beach Golf Links simulated positions)
        const HOLE_DATABASE = {
            1: {
                name: "Hole 1 (Par 4)",
                front: { lat: 36.568400, lon: -121.948300 },
                center: { lat: 36.568600, lon: -121.948200 },
                back: { lat: 36.568800, lon: -121.948100 }
            },
            2: {
                name: "Hole 2 (Par 5)",
                front: { lat: 36.570300, lon: -121.951700 },
                center: { lat: 36.570500, lon: -121.951500 },
                back: { lat: 36.570700, lon: -121.951300 }
            },
            3: {
                name: "Hole 3 (Par 3)",
                front: { lat: 36.569300, lon: -121.953700 },
                center: { lat: 36.569500, lon: -121.953500 },
                back: { lat: 36.569700, lon: -121.953300 }
            }
        };

        // Application State
        let currentHole = 1;
        let currentShot = 1;
        let selectedPin = 'center'; // default center
        let selectedLie = 'Tee'; // default lie
        let manualOverrideValue = ''; // keypad typed input
        let isManualMode = false;
        
        let simulatedDistanceYards = null; // Mock mode
        let watchId = null;
        let userLocation = null;

        // Initialize state on load
        window.addEventListener('DOMContentLoaded', () => {
            loadRoundState();
            setPinPosition('center');
            selectLie('Tee');
            setupGeolocation();
            renderShotLog();
        });

        // 1. Hole & Shot Management
        function changeHole(delta) {
            let nextHole = currentHole + delta;
            if (nextHole < 1) nextHole = 3; // Loop holes
            if (nextHole > 3) nextHole = 1;
            currentHole = nextHole;
            
            // Get last shot number for this hole from localStorage, or default to 1
            const shots = getShotsFromStorage();
            const holeShots = shots.filter(s => s.hole === currentHole);
            currentShot = holeShots.length > 0 ? Math.max(...holeShots.map(s => s.shot)) + 1 : 1;
            
            // Default lie suggestions:
            // Shot 1 on any hole is 'Tee', otherwise suggest 'Fairway' or 'Green' depending on shot index
            if (currentShot === 1) {
                selectLie('Tee');
            } else if (currentShot >= 4) {
                selectLie('Green');
            } else {
                selectLie('Fairway');
            }

            clearManualOverride();
            updateUI();
            recalculateDistance();
        }

        function adjustShot(delta) {
            let nextShot = currentShot + delta;
            if (nextShot < 1) nextShot = 1;
            currentShot = nextShot;
            updateUI();
        }

        // 2. Pin Position Toggle
        function setPinPosition(position) {
            selectedPin = position;
            
            // Update Toggle Button styles
            ['front', 'center', 'back'].forEach(p => {
                const btn = document.getElementById(`pin-${p}`);
                if (p === position) {
                    btn.className = "flex-1 py-2 rounded-lg font-bold text-xs uppercase tracking-wider bg-emerald-500 text-slate-950 shadow-md transform scale-[1.02] transition-all";
                } else {
                    btn.className = "flex-1 py-2 rounded-lg font-bold text-xs uppercase tracking-wider text-slate-400 hover:text-slate-200 transition-all bg-slate-900/40";
                }
            });

            recalculateDistance();
        }

        // 3. Geolocation & Haversine Distance Logic
        function setupGeolocation() {
            const statusDot = document.getElementById('gpsStatusDot');
            const statusText = document.getElementById('gpsStatusText');

            if (!navigator.geolocation) {
                statusDot.className = "w-2.5 h-2.5 rounded-full bg-rose-500";
                statusText.innerText = "GPS Not Supported";
                return;
            }

            statusDot.className = "w-2.5 h-2.5 rounded-full bg-yellow-500 pulse-dot";
            statusText.innerText = "Locating...";

            // Watch user position to get updates
            watchId = navigator.geolocation.watchPosition(
                (position) => {
                    userLocation = {
                        lat: position.coords.latitude,
                        lon: position.coords.longitude
                    };
                    
                    statusDot.className = "w-2.5 h-2.5 rounded-full bg-emerald-500 pulse-dot";
                    statusText.innerText = "GPS Active";
                    
                    recalculateDistance();
                },
                (error) => {
                    console.error("GPS Error:", error);
                    // If we are simulating, we ignore error
                    if (simulatedDistanceYards === null) {
                        statusDot.className = "w-2.5 h-2.5 rounded-full bg-rose-500";
                        statusText.innerText = "GPS Offline";
                        document.getElementById('distanceDisplay').innerText = "---";
                    }
                },
                {
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 0
                }
            );
        }

        function refreshGPS() {
            setupGeolocation();
            showToast("GPS Connection Refreshed");
        }

        // Haversine formula to compute distance in yards
        function calculateDistanceYards(lat1, lon1, lat2, lon2) {
            const R_earth_m = 6371000; // Earth radius in meters
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = 
                Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * 
                Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            const distanceMeters = R_earth_m * c;
            return Math.round(distanceMeters * 1.09361); // yards conversion
        }

        function recalculateDistance() {
            const target = HOLE_DATABASE[currentHole][selectedPin];
            document.getElementById('targetCoordsText').innerText = `Pin: ${target.lat.toFixed(6)}, ${target.lon.toFixed(6)}`;

            if (isManualMode) {
                // Keep manual display active
                document.getElementById('distanceDisplay').innerText = manualOverrideValue;
                return;
            }

            if (simulatedDistanceYards !== null) {
                // Simulator active: compute mock coordinates matching that distance
                // 1 yard in lat is roughly 1 / 121390 degrees.
                const yardOffset = simulatedDistanceYards / 121390;
                userLocation = {
                    lat: target.lat + yardOffset,
                    lon: target.lon
                };
            }

            if (userLocation) {
                const dist = calculateDistanceYards(
                    userLocation.lat, userLocation.lon,
                    target.lat, target.lon
                );
                document.getElementById('distanceDisplay').innerText = dist;
            } else {
                document.getElementById('distanceDisplay').innerText = "---";
            }
        }

        // 4. Developer Simulator Mode
        function setSimulation(yards) {
            simulatedDistanceYards = yards;
            const simIndicator = document.getElementById('simulatedIndicator');
            const statusDot = document.getElementById('gpsStatusDot');
            const statusText = document.getElementById('gpsStatusText');

            if (yards !== null) {
                simIndicator.classList.remove('hidden');
                statusDot.className = "w-2.5 h-2.5 rounded-full bg-amber-500 pulse-dot";
                statusText.innerText = `Sim: ${yards} Yds`;
                showToast(`Simulator Set to ${yards} Yards`);
            } else {
                simIndicator.classList.add('hidden');
                statusDot.className = userLocation ? "w-2.5 h-2.5 rounded-full bg-emerald-500 pulse-dot" : "w-2.5 h-2.5 rounded-full bg-yellow-500 pulse-dot";
                statusText.innerText = userLocation ? "GPS Active" : "Acquiring GPS";
                showToast("Real Device GPS Active");
            }
            recalculateDistance();
        }

        // 5. Numeric Keypad Override Logic
        function pressKey(key) {
            isManualMode = true;
            document.getElementById('distanceLabel').innerText = "Manual Override";
            document.getElementById('clearOverrideBtn').classList.remove('hidden');

            if (key === 'C') {
                manualOverrideValue = '';
            } else if (key === '⌫') {
                manualOverrideValue = manualOverrideValue.slice(0, -1);
            } else {
                // Max length 3 digits (max yards usually 999)
                if (manualOverrideValue.length < 3) {
                    manualOverrideValue += key;
                }
            }

            // If empty, default visual text
            if (manualOverrideValue === '') {
                document.getElementById('distanceDisplay').innerText = '0';
            } else {
                document.getElementById('distanceDisplay').innerText = manualOverrideValue;
            }
        }

        function clearManualOverride() {
            isManualMode = false;
            manualOverrideValue = '';
            document.getElementById('distanceLabel').innerText = "GPS Distance";
            document.getElementById('clearOverrideBtn').classList.add('hidden');
            recalculateDistance();
        }

        // 6. Lie Selection
        function selectLie(lie) {
            selectedLie = lie;
            const lies = ['Tee', 'Fairway', 'Rough', 'Sand', 'Green', 'Penalty'];
            
            lies.forEach(l => {
                const btn = document.getElementById(`lie-${l}`);
                const svg = btn.querySelector('svg');
                
                if (l === lie) {
                    if (l === 'Penalty') {
                        btn.className = "flex flex-col items-center justify-center p-3 rounded-xl border transition-all duration-200 bg-rose-950/40 border-rose-500 text-rose-300 scale-[1.03] shadow-md shadow-rose-950/50";
                        svg.className = "w-6 h-6 mb-1.5 text-rose-400";
                    } else {
                        btn.className = "flex flex-col items-center justify-center p-3 rounded-xl border transition-all duration-200 bg-emerald-500/10 border-emerald-500 text-emerald-400 scale-[1.03] shadow-md shadow-emerald-950/50";
                        svg.className = "w-6 h-6 mb-1.5 text-emerald-400";
                    }
                } else {
                    btn.className = "flex flex-col items-center justify-center p-3 rounded-xl border transition-all duration-200 bg-slate-900 border-slate-800 text-slate-400 hover:border-slate-700 active:scale-95";
                    svg.className = "w-6 h-6 mb-1.5 text-slate-500";
                }
            });
        }

        // 7. Action Flow - Save & LocalStorage
        function submitShot() {
            const displayVal = document.getElementById('distanceDisplay').innerText;
            if (displayVal === '---' || displayVal === '') {
                showToast("Please acquire GPS or enter distance");
                return;
            }

            const dist = parseInt(displayVal, 10);
            
            const newShot = {
                id: Date.now(),
                hole: currentHole,
                shot: currentShot,
                lie: selectedLie,
                distance: dist,
                pin: selectedPin,
                isOverride: isManualMode,
                timestamp: new Date().toISOString()
            };

            // Save to localStorage
            const shots = getShotsFromStorage();
            
            // Check if this Hole/Shot combination already exists to prevent duplicate indexes
            const duplicateIndex = shots.findIndex(s => s.hole === currentHole && s.shot === currentShot);
            if (duplicateIndex !== -1) {
                shots[duplicateIndex] = newShot; // update
            } else {
                shots.push(newShot); // insert
            }

            saveShotsToStorage(shots);
            renderShotLog();

            showToast(`Hole ${currentHole} Shot ${currentShot} Logged!`);

            // Auto advance shot index
            currentShot += 1;
            
            // Smart auto-lie logic:
            // If previous was Green, default green. If previous was Tee, default Fairway.
            if (selectedLie === 'Green') {
                selectLie('Green');
            } else if (selectedLie === 'Tee') {
                selectLie('Fairway');
            } else {
                // Keep the current lie or suggest based on progress
                selectLie(selectedLie);
            }

            clearManualOverride();
            updateUI();
        }

        // Helper storage get/set
        function getShotsFromStorage() {
            const raw = localStorage.getItem('caddyshot_round');
            return raw ? JSON.parse(raw) : [];
        }

        function saveShotsToStorage(shots) {
            localStorage.setItem('caddyshot_round', JSON.stringify(shots));
        }

        function loadRoundState() {
            const shots = getShotsFromStorage();
            if (shots.length > 0) {
                // Resume from highest logged hole
                const highestHole = Math.max(...shots.map(s => s.hole));
                currentHole = highestHole;
                // Resume from next shot index on that hole
                const holeShots = shots.filter(s => s.hole === currentHole);
                currentShot = Math.max(...holeShots.map(s => s.shot)) + 1;
            } else {
                currentHole = 1;
                currentShot = 1;
            }
            updateUI();
        }

        // 8. Render Shot Log List
        function renderShotLog() {
            const container = document.getElementById('shotLogContainer');
            const shots = getShotsFromStorage();
            
            // Set counter count
            document.getElementById('logCount').innerText = shots.length;

            if (shots.length === 0) {
                container.innerHTML = `<div id="emptyLogText" class="p-4 text-center text-xs text-slate-500 italic">No shots logged yet. Take your first shot!</div>`;
                return;
            }

            // Sort shots: highest hole first, highest shot first
            const sortedShots = [...shots].sort((a, b) => {
                if (a.hole !== b.hole) return b.hole - a.hole;
                return b.shot - a.shot;
            });

            container.innerHTML = sortedShots.map(s => `
                <div class="px-4 py-2.5 flex items-center justify-between text-xs hover:bg-slate-850/50 transition-all">
                    <div class="flex items-center gap-2.5">
                        <span class="bg-slate-950 px-2 py-0.5 rounded font-extrabold text-[10px] text-emerald-400 border border-slate-800">H${s.hole}</span>
                        <div class="flex flex-col">
                            <span class="font-bold text-slate-200">Shot ${s.shot}: <span class="text-emerald-400 font-semibold">${s.lie}</span></span>
                            <span class="text-[9px] text-slate-500">${new Date(s.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})} • Pin: ${s.pin}</span>
                        </div>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="font-extrabold text-slate-100">${s.distance} YDS ${s.isOverride ? '<span class="text-[9px] text-amber-500 font-bold ml-0.5">(M)</span>' : ''}</span>
                        <button onclick="deleteShot(${s.id})" class="text-slate-600 hover:text-rose-400 p-1 rounded hover:bg-rose-950/20 transition-all">
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-16v1a3 3 0 003 3h10M9 3h6m2 5V4a1 1 0 00-1-1H7a1 1 0 00-1 1v4"/></svg>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function deleteShot(id) {
            let shots = getShotsFromStorage();
            shots = shots.filter(s => s.id !== id);
            saveShotsToStorage(shots);
            renderShotLog();
            showToast("Shot Deleted");
            
            // Adjust current shot index back if appropriate
            const currentHoleShots = shots.filter(s => s.hole === currentHole);
            if (currentHoleShots.length > 0) {
                currentShot = Math.max(...currentHoleShots.map(s => s.shot)) + 1;
            } else {
                currentShot = 1;
            }
            updateUI();
        }

        // 9. Export CSV to Clipboard
        function copyCSVExport() {
            const shots = getShotsFromStorage();
            if (shots.length === 0) {
                showToast("No logged shots to export");
                return;
            }

            // Generate CSV
            let csvContent = "Hole,Shot,Lie,Distance (Yds),Pin Position,Override,Timestamp\n";
            shots.forEach(s => {
                csvContent += `${s.hole},${s.shot},${s.lie},${s.distance},${s.pin},${s.isOverride ? 'Yes' : 'No'},${s.timestamp}\n`;
            });

            // Write to Clipboard
            navigator.clipboard.writeText(csvContent).then(() => {
                showToast("CSV Block Copied!");
            }).catch(err => {
                console.error("Failed to copy CSV: ", err);
                showToast("Export failed. Check console.");
            });
        }

        // 10. Reset Round data
        function confirmReset() {
            if (confirm("Are you sure you want to clear this entire round's data? This cannot be undone.")) {
                localStorage.removeItem('caddyshot_round');
                currentHole = 1;
                currentShot = 1;
                selectedPin = 'center';
                selectLie('Tee');
                clearManualOverride();
                updateUI();
                renderShotLog();
                showToast("Round Reset Successfully");
            }
        }

        // UI toggles and updates
        function updateUI() {
            document.getElementById('currentHoleDisplay').innerText = currentHole;
            document.getElementById('holeNameDisplay').innerText = HOLE_DATABASE[currentHole].name;
            document.getElementById('currentShotDisplay').innerText = currentShot;
        }

        function toggleDevConsole() {
            const dev = document.getElementById('devConsoleContent');
            const arrow = document.getElementById('devArrow');
            if (dev.classList.contains('hidden')) {
                dev.classList.remove('hidden');
                arrow.classList.add('rotate-180');
            } else {
                dev.classList.add('hidden');
                arrow.classList.remove('rotate-180');
            }
        }

        function toggleLog() {
            const log = document.getElementById('shotLogContainer');
            const arrow = document.getElementById('logArrow');
            if (log.classList.contains('hidden')) {
                log.classList.remove('hidden');
                arrow.classList.add('rotate-180');
            } else {
                log.classList.add('hidden');
                arrow.classList.remove('rotate-180');
            }
        }

        // Flash beautiful toast
        function showToast(msg) {
            const toast = document.getElementById('toastAlert');
            const message = document.getElementById('toastMessage');
            message.innerText = msg;
            toast.className = "absolute bottom-24 left-1/2 -translate-x-1/2 z-50 bg-emerald-600/95 text-white font-semibold text-xs py-2.5 px-5 rounded-full shadow-lg border border-emerald-400 flex items-center gap-1.5 transition-all duration-300 transform scale-100 opacity-100";
            
            setTimeout(() => {
                toast.className = "pointer-events-none opacity-0 transform translate-y-3 transition-all duration-300 absolute bottom-24 left-1/2 -translate-x-1/2 z-50 bg-emerald-600/90 text-white font-semibold text-xs py-2 px-4 rounded-full shadow-lg border border-emerald-400 flex items-center gap-1.5";
            }, 2500);
        }
    </script>
</body>
